services:
  postgres:
    image: postgres:16
    container_name: auctionharvester-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: auction
      POSTGRES_PASSWORD: auction
      POSTGRES_DB: auctionharvester
      POSTGRES_INITDB_ARGS: "-c shared_buffers=128MB -c effective_cache_size=256MB -c work_mem=16MB -c maintenance_work_mem=32MB -c random_page_cost=1.1"
    ports:
      - "5432:5432"
    volumes:
      - ${POSTGRES_DATA_PATH:-/Volumes/harvester/harvester/pgdata}:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auction -d auctionharvester"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  updater:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: auctionharvester-updater
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://auction:auction@postgres:5432/auctionharvester
      BLIZZARD_CLIENT_ID: ${BLIZZARD_CLIENT_ID}
      BLIZZARD_CLIENT_SECRET: ${BLIZZARD_CLIENT_SECRET}
      REGIONS: ${REGIONS:-eu,us,kr,tw}
      INTERVAL_MINUTES: ${INTERVAL_MINUTES:-20}
      OUTPUT_DIR: ${OUTPUT_DIR:-data}
    volumes:
      - ${AUCTION_DATA_PATH:-/Volumes/harvester/harvester/data}:/app/data
      - ${REALM_LISTS_PATH:-./realm_lists}:/app/realm_lists:ro
